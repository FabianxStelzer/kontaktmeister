services:
  postgres:
    image: postgres:16-alpine
    ports:
      - "5432:5432"
    environment:
      POSTGRES_USER: kontaktmeister
      POSTGRES_PASSWORD: kontaktmeister
      POSTGRES_DB: kontaktmeister
    volumes:
      - dev_postgres:/var/lib/postgresql/data

  redis:
    image: redis:7-alpine
    ports:
      - "6379:6379"
    volumes:
      - dev_redis:/data

volumes:
  dev_postgres:
  dev_redis:
